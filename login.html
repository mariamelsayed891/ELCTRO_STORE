<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ElectroStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/main.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .back-home { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 20px; transition: var(--transition); }
        .back-home:hover { color: var(--primary); }
        .back-home i { margin-right: 5px; }
    </style>
</head>
<body class="login-body">

    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>

    <div class="login-container" id="container">

        <!-- Sign Up -->
        <div class="form-container-login sign-up">
            <form onsubmit="return false;">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="#" title="Google"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" title="GitHub"><i class="fa-brands fa-github"></i></a>
                    <a href="#" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email to register</span>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button class="form-button" onclick="handleSignup()">Sign Up</button>
            </form>
        </div>

        <!-- Sign In -->
        <div class="form-container-login sign-in">
            <form onsubmit="return false;">
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="#" title="Google"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" title="GitHub"><i class="fa-brands fa-github"></i></a>
                    <a href="#" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email & password</span>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <a href="#">Forgot Your Password?</a>
                <button class="form-button" onclick="handleLogin()">Sign In</button>
            </form>
        </div>

        <!-- Toggle Panel -->
        <div class="toggle-container-login">
            <div class="toggle-login">
                <div class="toggle-panel-login toggle-left-login">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details to access all site features</p>
                    <button class="form-button hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel-login toggle-right-login">
                    <h1>Hello, Friend!</h1>
                    <p>Register with your personal details to use all site features</p>
                    <button class="form-button hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>

    </div>

    <script>
    const container = document.getElementById('container');
    document.getElementById('register').onclick = () => container.classList.add('active');
    document.getElementById('login').onclick = () => container.classList.remove('active');

    function handleLogin() {
        alert('Login successful! Welcome back to ElectroStore.');
        window.location.href = 'index.html';
    }

    function handleSignup() {
        alert('Account created successfully! Welcome to ElectroStore.');
        window.location.href = 'index.html';
    }
    </script>
</body>
</html>
